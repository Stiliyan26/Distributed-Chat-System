name: chat-system-channel

services:
  channel-service:
    build:
      context: ./chat-system
      dockerfile: services/channel/Dockerfile
    container_name: channel-service
    environment:
      DATABASE_URL: "${CHANNEL_DATABASE_URL:-}"
      DB_SYNC: "true"
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3020:3000"
      - "9235:9235"
    networks:
      - chat-network

networks:
  chat-network:
    name: chat-network
    driver: bridge
