name: chat-system-presence

services:
  presence-service:
    build:
      context: ./chat-system
      dockerfile: services/presence/Dockerfile
    container_name: presence-service
    environment:
      NODE_ENV: production
      PORT: "3004"
      REDIS_DATABASE_URL: "${PRESENCE_REDIS_URL:-}"
    ports:
      - "3004:3004"
      - "9233:9233"
    networks:
      - chat-network

networks:
  chat-network:
    name: chat-network
    driver: bridge
