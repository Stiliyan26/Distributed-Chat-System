name: chat--system-messaging

services:
  messaging-service:
    build:
      context: ./chat-system
      dockerfile: services/messaging/Dockerfile.api
    container_name: messaging-service
    environment:
      PORT: "3000"
      KAFKA_BROKER: "${KAFKA_BROKER:-}"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-messages_topic}"
      KAFKA_CLIENT_ID: "${KAFKA_CLIENT_ID:-messaging-service-docker}"
      KAFKA_SASL_USERNAME: "${KAFKA_SASL_USERNAME:-${KAFKA_API_KEY:-}}"
      KAFKA_SASL_PASSWORD: "${KAFKA_SASL_PASSWORD:-${KAFKA_API_SECRET:-}}"
      KAFKA_SESSION_TIMEOUT_MS: "${KAFKA_SESSION_TIMEOUT_MS:-45000}"
      DATABASE_URL: "${MESSAGES_DATABASE_URL:-}"
      DB_SYNC: "true"
      CHANNEL_SERVICE_URL: "http://channel-service:3000"
      PRESENCE_SERVICE_URL: "http://presence-service:3004"
      DELIVERY_SERVICE_URL: "http://delivery-service:3005"
      AUTH_SERVICE_URL: "http://auth-service:3001"
      KAFKA_CONSUMER_GROUP: messaging-service-group
      KAFKAJS_NO_PARTITIONER_WARNING: "1"
    ports:
      - "3003:3000"
      - "9231:9231"
    networks:
      - chat-network

  messaging-worker:
    build:
      context: ./chat-system
      dockerfile: services/messaging/Dockerfile.worker
    container_name: messaging-worker
    environment:
      KAFKA_BROKER: "${KAFKA_BROKER:-}"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-messages_topic}"
      KAFKA_CLIENT_ID: "${KAFKA_CLIENT_ID:-messaging-worker-docker}"
      KAFKA_SASL_USERNAME: "${KAFKA_SASL_USERNAME:-${KAFKA_API_KEY:-}}"
      KAFKA_SASL_PASSWORD: "${KAFKA_SASL_PASSWORD:-${KAFKA_API_SECRET:-}}"
      KAFKA_SESSION_TIMEOUT_MS: "${KAFKA_SESSION_TIMEOUT_MS:-45000}"
      KAFKA_CONSUMER_GROUP: messaging-workers
      DATABASE_URL: "${MESSAGES_DATABASE_URL:-}"
      DB_SYNC: "true"
      CHANNEL_SERVICE_URL: "http://channel-service:3000"
      PRESENCE_SERVICE_URL: "http://presence-service:3004"
      DELIVERY_SERVICE_URL: "http://delivery-service:3005"
      AUTH_SERVICE_URL: "http://auth-service:3001"
    ports:
      - "9229:9229"
    networks:
      - chat-network

networks:
  chat-network:
    name: chat-network
    driver: bridge
