---
apiVersion: v1
kind: Service
metadata:
  name: presence-service
  namespace: chat-system
  labels:
    app: presence-service
spec:
  type: ClusterIP
  ports:
    - port: 3004
      targetPort: 3004
  selector:
    app: presence-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: presence-service
  namespace: chat-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: presence-service
  template:
    metadata:
      labels:
        app: presence-service
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis-presence 6379; do sleep 2; done
      containers:
        - name: presence-service
          image: chat-system/presence:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3004
            - containerPort: 9233
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3004"
            - name: REDIS_DATABASE_URL
              value: redis://redis-presence:6379
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-service
  namespace: chat-system
  labels:
    app: delivery-service
spec:
  type: ClusterIP
  ports:
    - port: 3005
      targetPort: 3005
  selector:
    app: delivery-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  namespace: chat-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis-pubsub 6379; do sleep 2; done
      containers:
        - name: delivery-service
          image: chat-system/delivery:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3005
            - containerPort: 9234
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3005"
            - name: REDIS_PUBSUB_URL
              value: redis://redis-pubsub:6379
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: chat-system-secrets
                  key: smtp-host
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: chat-system-secrets
                  key: smtp-port
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: chat-system-secrets
                  key: smtp-user
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: chat-system-secrets
                  key: smtp-pass
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: chat-system
  labels:
    app: chat-service
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: chat-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: chat-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z redis-pubsub 6379; do sleep 2; done
        - name: wait-for-messaging
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z messaging-service 3000; do sleep 2; done
        - name: wait-for-presence
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z presence-service 3004; do sleep 2; done
      containers:
        - name: chat-service
          image: chat-system/chat:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
            - containerPort: 9230
          env:
            - name: MESSAGING_SERVICE_URL
              value: http://messaging-service:3000
            - name: PRESENCE_SERVICE_URL
              value: http://presence-service:3004
            - name: REDIS_PUBSUB_URL
              value: redis://redis-pubsub:6379
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: chat-system
  labels:
    app: api-gateway
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: chat-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-for-backends
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z auth-service 3001; do sleep 2; done
              until nc -z channel-service 3000; do sleep 2; done
              until nc -z messaging-service 3000; do sleep 2; done
              until nc -z chat-service 3000; do sleep 2; done
      containers:
        - name: api-gateway
          image: chat-system/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
            - containerPort: 9236
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chat-system-secrets
                  key: jwt-secret
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3001
            - name: CHANNEL_SERVICE_URL
              value: http://channel-service:3000
            - name: MESSAGING_SERVICE_URL
              value: http://messaging-service:3000
            - name: CHAT_SERVICE_URL
              value: http://chat-service:3000
