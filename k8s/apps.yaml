---
apiVersion: v1
kind: Service
metadata:
  name: messaging-service
  namespace: chat-system
  labels:
    app: messaging-service
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: messaging-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: messaging-service
  namespace: chat-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messaging-service
  template:
    metadata:
      labels:
        app: messaging-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z messages-db 5432; do sleep 2; done
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z kafka 29092; do sleep 2; done
      containers:
        - name: messaging-service
          image: chat-system/messaging-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
            - containerPort: 9231
          env:
            - name: PORT
              value: "3000"
            - name: KAFKA_BROKER
              value: kafka:29092
            - name: KAFKA_TOPIC
              value: messages
            - name: DB_HOST
              value: messages-db
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chat-system-secrets
                  key: postgres-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chat-system-secrets
                  key: postgres-password
            - name: DB_NAME
              value: messages_db
            - name: DB_TYPE
              value: postgres
            - name: DB_SYNC
              value: "true"
            - name: CHANNEL_SERVICE_URL
              value: http://channel-service:3000
            - name: PRESENCE_SERVICE_URL
              value: http://presence-service:3004
            - name: DELIVERY_SERVICE_URL
              value: http://delivery-service:3005
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3001
            - name: KAFKA_CONSUMER_GROUP
              value: messaging-service-group
            - name: KAFKAJS_NO_PARTITIONER_WARNING
              value: "1"
---
