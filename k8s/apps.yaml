---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: chat-system
  labels:
    app: auth-service
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: 3001
  selector:
    app: auth-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: chat-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z users-db 5432; do sleep 2; done
      containers:
        - name: auth-service
          image: chat-system/auth:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
            - containerPort: 9232
          env:
            - name: DB_TYPE
              value: postgres
            - name: DB_HOST
              value: users-db
            - name: DB_PORT
              value: "5432"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: chat-system-secrets
                  key: postgres-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chat-system-secrets
                  key: postgres-password
            - name: DB_NAME
              value: users_db
            - name: DB_SYNC
              value: "true"
            - name: NODE_ENV
              value: production
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chat-system-secrets
                  key: jwt-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: chat-system-secrets
                  key: jwt-refresh-secret
            - name: PORT
              value: "3001"
---
