apiVersion: v1
kind: ConfigMap
metadata:
  name: channel-config
  namespace: apps
  labels:
    app: channel
    app.kubernetes.io/part-of: chat-system
data:
  NODE_ENV: production
  PORT: "3000"
  DB_TYPE: postgres
  DB_HOST: postgres.infra.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: channels_db
  DB_SYNC: "true"
