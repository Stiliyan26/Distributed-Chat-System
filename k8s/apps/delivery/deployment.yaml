apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery
  namespace: apps
  labels:
    app: delivery
    app.kubernetes.io/part-of: chat-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: delivery
  template:
    metadata:
      labels:
        app: delivery
    spec:
      containers:
        - name: delivery
          image: chat-system/delivery:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3005
          envFrom:
            - configMapRef:
                name: delivery-config
            - secretRef:
                name: delivery-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
