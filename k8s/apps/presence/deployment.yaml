apiVersion: apps/v1
kind: Deployment
metadata:
  name: presence
  namespace: apps
  labels:
    app: presence
    app.kubernetes.io/part-of: chat-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: presence
  template:
    metadata:
      labels:
        app: presence
    spec:
      containers:
        - name: presence
          image: chat-system/presence:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3004
          envFrom:
            - configMapRef:
                name: presence-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
