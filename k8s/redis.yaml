---
apiVersion: v1
kind: Service
metadata:
  name: redis-pubsub
  namespace: chat-system
  labels:
    app: redis-pubsub
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: redis-pubsub
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-pubsub
  namespace: chat-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-pubsub
  template:
    metadata:
      labels:
        app: redis-pubsub
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
