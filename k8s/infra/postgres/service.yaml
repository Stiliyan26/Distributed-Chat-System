apiVersion: v1
kind: Service
metadata:
  name: postgres-hl
  namespace: infra
  labels:
    app: postgres
    app.kubernetes.io/part-of: chat-system
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: infra
  labels:
    app: postgres
    app.kubernetes.io/part-of: chat-system
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
