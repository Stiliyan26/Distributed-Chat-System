apiVersion: v1
kind: Service
metadata:
  name: redis-hl
  namespace: infra
  labels:
    app: redis
    app.kubernetes.io/part-of: chat-system
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: infra
  labels:
    app: redis
    app.kubernetes.io/part-of: chat-system
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
